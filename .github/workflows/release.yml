name: Build & Release CoPas

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (npm)
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CoPas ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 CoPas ${{ github.ref_name }}

            ### Downloads
            - **Windows**: Download `.exe` installer
            - **macOS (Apple Silicon)**: Download `aarch64.dmg`
            - **macOS (Intel)**: Download `x64.dmg`

            ### Cài đặt trên macOS
            1. Tải `.dmg` → mở → kéo CoPas vào Applications
            2. Nếu gặp lỗi "is damaged", mở Terminal chạy:
               ```
               xattr -cr /Applications/CoPas.app
               ```
            3. Mở lại CoPas bình thường

            ### Cập nhật
            - Ứng dụng sẽ tự động kiểm tra và thông báo khi có phiên bản mới
            - Nhấn "🔄 Cập nhật" để tải và cài đặt ngay

            ### Sử dụng
            - **Cmd+Shift+V** (Mac) hoặc **Ctrl+Shift+V** (Windows) để mở popup
            - **Click** vào mục → tự dán vào app đang dùng
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
